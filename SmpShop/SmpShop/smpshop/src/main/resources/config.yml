# =========================================================
#  SMPShop configuration
#  Everything here can be edited without recompiling.
#  Colors use the standard '&' code format (e.g. &e = yellow).
# =========================================================

settings:
  currency: VAULT          # VAULT (uses AstraEconomy directly if installed, else falls back to a Vault-linked economy plugin)
  sell-multiplier: 0.5      # if an item has no explicit sell-price, sell = price * multiplier
  max-quantity-per-purchase: 6400

gui:
  main-menu-title: "&8Shop &7» &fCategories"
  main-menu-size: 27
  border:
    material: GRAY_STAINED_GLASS_PANE
    name: " "
  category-slots:
    overworld: 10
    nether: 11
    end: 12
    gear: 14
    food: 16

categories:
  overworld:
    icon: GRASS_BLOCK
    name: "&aOverworld Shop"
    lore:
      - "&7Common blocks and resources"
      - "&7found across the Overworld."
    menu-title: "&8Shop &7» &aOverworld"

  nether:
    icon: NETHERRACK
    name: "&cNether Shop"
    lore:
      - "&7Materials gathered from"
      - "&7the Nether."
    menu-title: "&8Shop &7» &cNether"

  end:
    icon: END_STONE
    name: "&5End Shop"
    lore:
      - "&7Rare materials from"
      - "&7the End dimension."
    menu-title: "&8Shop &7» &5End"

  gear:
    icon: DIAMOND_SWORD
    name: "&bGear Shop"
    lore:
      - "&7Weapons, armor and"
      - "&7combat essentials."
    menu-title: "&8Shop &7» &bGear"

  food:
    icon: COOKED_BEEF
    name: "&6Food Shop"
    lore:
      - "&7Keep your hunger bar full."
    menu-title: "&8Shop &7» &6Food"

# ---------------------------------------------------------
# Items per category.
# slot   = position inside that category's 54-slot menu
# price  = buy price (per single item)
# sell   = optional explicit sell price (per single item);
#          if omitted, sell = price * settings.sell-multiplier
# ---------------------------------------------------------
shops:
  overworld:
    items:
      dirt:          { material: DIRT,           slot: 10, price: 1,    sell: 0.25 }
      cobblestone:   { material: COBBLESTONE,    slot: 11, price: 1,    sell: 0.25 }
