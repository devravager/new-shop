messages:
  prefix: "&8[&6Shop&8] &r"
  not-enough-money: "&cYou don't have enough money for that."
  purchase-success: "&aBought &f%amount%x %item% &afor &f%price%&a."
  sell-success: "&aSold &f%amount%x %item% &afor &f%price%&a."
  nothing-to-sell: "&cYou aren't holding anything sellable."
  not-sellable: "&cThat item can't be sold here."
  inventory-full: "&cYour inventory is full."
  no-permission: "&cYou don't have permission to do that."
  config-reloaded: "&aSMPShop configuration reloaded."
  vault-missing: "&cNo economy plugin found (AstraEconomy or Vault) - buying/selling is disabled."

sounds:
  purchase-success: "ENTITY_EXPERIENCE_ORB_PICKUP"
  purchase-fail: "ENTITY_VILLAGER_NO"
  click: "UI_BUTTON_CLICK"
  volume: 0.6
  pitch: 1.0
